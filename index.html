<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' blob: https://unpkg.com https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https://unpkg.com https://cdn.jsdelivr.net; font-src 'self' https://unpkg.com https://cdn.jsdelivr.net;">
    <title>礼物播放器</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <div id="app" class="gp-app">
      <main class="gp-main">
        <div id="drop-zone" class="gp-drop-zone">
          <div id="canvas-container" class="gp-canvas-container">
            <canvas id="video-canvas"></canvas>
          </div>
          <div id="drop-overlay" class="gp-drop-overlay">
            <div class="gp-drop-message">
              <svg class="gp-drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <p>拖放视频到这里</p>
            </div>
          </div>
        </div>
      </main>

      <footer class="gp-controls">
        <div class="gp-playback-controls-row">
          <div class="gp-playback-buttons">
            <button id="btn-load-video" class="gp-btn gp-btn-icon" title="加载视频" aria-label="加载视频">
              <svg class="gp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </button>
            <button id="btn-play" class="gp-btn gp-btn-icon" title="播放/暂停">
              <svg id="icon-play" class="gp-icon" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              <svg id="icon-pause" class="gp-icon hidden" viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="4" width="4" height="16"/>
                <rect x="14" y="4" width="4" height="16"/>
              </svg>
            </button>
            <button id="btn-stop" class="gp-btn gp-btn-icon" title="停止">
              <svg class="gp-icon" viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="6" width="12" height="12"/>
              </svg>
            </button>
            <button id="btn-loop" class="gp-btn gp-btn-icon" title="循环">
              <svg class="gp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="17 1 21 5 17 9"/>
                <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/>
                <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
            </button>
          </div>

          <button id="btn-export" class="gp-btn gp-btn-icon gp-btn-export" title="导出" aria-label="导出">
            <svg class="gp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 3v12"/>
              <polyline points="7 10 12 15 17 10"/>
              <path d="M5 21h14"/>
            </svg>
          </button>
        </div>
      </footer>

      <div id="loading-overlay" class="gp-loading-overlay hidden">
        <div class="gp-loading-spinner"></div>
        <p id="loading-message" class="gp-loading-message">加载中...</p>
      </div>
    </div>

    <script type="module" src="/src/renderer.js"></script>
  </body>
</html>
